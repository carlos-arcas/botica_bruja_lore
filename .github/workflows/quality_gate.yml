name: Quality Gate

on:
  push:
  pull_request:

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_gate:
    name: Canonical release gate validation
    runs-on: [self-hosted, Windows, X64, botica-bruja-lore]
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate Railway TOML files
        run: |
          python -c "import tomllib; from pathlib import Path; files = [Path('backend/railway.toml'), Path('frontend/railway.toml')]; [tomllib.load(file.open('rb')) for file in files]; [print(f'OK TOML: {file}') for file in files]"

      - name: Run canonical release gate command
        run: python scripts/check_release_gate.py

      - name: Ensure clean bootstrap demo SQLite file
        run: |
          $dbFile = 'bootstrap_demo_ci.sqlite3'
          if (Test-Path $dbFile) {
            Remove-Item $dbFile -Force
            Write-Host "Removed stale file: $dbFile"
          }

      - name: Run bootstrap demo script in isolated database
        env:
          DATABASE_URL: sqlite:///bootstrap_demo_ci.sqlite3
          SECRET_KEY: ci-bootstrap-secret
        run: python scripts/bootstrap_demo_release.py

      - name: Assert bootstrap demo expected public counts
        env:
          DATABASE_URL: sqlite:///bootstrap_demo_ci.sqlite3
          SECRET_KEY: ci-bootstrap-secret
        run: |
          python manage.py shell -c "from backend.nucleo_herbal.infraestructura.persistencia_django.models import IntencionModelo, PlantaModelo, ProductoModelo, RitualModelo; assert IntencionModelo.objects.filter(es_publica=True).count() == 2; assert PlantaModelo.objects.filter(publicada=True).count() == 2; assert ProductoModelo.objects.filter(publicado=True).count() == 2; assert RitualModelo.objects.filter(publicado=True).count() == 1; print('Conteos esperados OK: 2/2/2/1')"

      - name: Cleanup bootstrap demo SQLite file
        if: always()
        run: |
          $dbFile = 'bootstrap_demo_ci.sqlite3'
          if (Test-Path $dbFile) {
            Remove-Item $dbFile -Force
            Write-Host "Cleaned up file: $dbFile"
          }
